title: Rain
description: SherryAnalytics – writings on data, AI, and reflections
baseurl: "/Rain"
url: "https://sherryanalytics.github.io"

remote_theme: mmistakes/minimal-mistakes@4.24.0

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap

author:
  name: "SherryAnalytics"
  bio: "Writing about data engineering, AI, and cloud."
  location: "Phoenix, AZ"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true

header_pages:
  - garden-of-thoughts/index.md
